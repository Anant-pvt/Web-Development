<!--a form with name city pincode of a user vertically aligned-->




<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <h1>This form is to collect your information</h1>
    <form>
        <div>
            <label for="name">Name:</label>
            <input type="text" id="name" name="username" autocapitalize="characters" placeholder="Your Name">
        </div>

        <div>
            <label for="city">City:</label>
            <input type="text" id="city" name="city" placeholder="City">
        </div>

        <div>
            <label for="pincode">Pincode:</label>
            <input type="number" id="pincode" name="pincode" placeholder="Your Pincode">
        </div>

        <input type="submit" value="submit">
    </form>
</body>
</html>
