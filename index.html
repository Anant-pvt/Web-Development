<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My first ever form made</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1>This form is to collect your information</h1>

    <form action="post" method="post">

        <div>

            <label for="name">Name:</label>
            <textarea id="name" name="Username" required placeholder="Name" rows="4" cols="10"></textarea>
        </div>

        <div>
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required placeholder="Email">
        </div>

        <div>
            <label for="age">Age:</label>
            <input type="number" id="age" name="age" placeholder="Age">
        </div>

        <div>
            <label for="Gender">Gender:</label>
            <input type="radio" id="Male" name="gender" value="male">
            <label for="Male">Male</label>
            <input type="image" id="Female" name="gender" value="female">
            <label for="Female">Female</label>
        </div>

        <div>
            <label for="Countries you have visited">Countries you have visited:</label>
            <input type="checkbox" id="Countries you have visited" name="countries" value="India">
            <label for="India">India:</label>
            <input type="checkbox" id="Countries you have visited" name="countries" value="USA">
            <label for="USA">USA:</label>
            <input type="checkbox" id="Countries you have visited" name="Brazil" <label for="Brazil">Brazil:</label>

        </div>

        <div>
            <input type="submit" value="Submit">
        </div>



    </form>

</html>>

</html>>
